receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Prometheus receiver for metrics
  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector'
          static_configs:
            - targets: ['localhost:8888']

processors:
  # Add batch processing for efficiency
  batch:
    send_batch_size: 512
    timeout: 5s
    send_batch_max_size: 1024

  # Memory limiter to prevent OOM
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  # Add attributes for attribution
  attributes:
    actions:
      - key: project.owner
        value: "Keith Luton"
        action: upsert
      - key: framework
        value: "Luton Field Model"
        action: upsert

  # Resource detection
  resource_detection:
    detectors: [env, system]

exporters:
  # Logging exporter - output to console
  logging:
    loglevel: debug

  # Optional: Export to Jaeger for visualization
  jaeger:
    endpoint: "http://jaeger:14250"
    timeout: 10s

  # Optional: Export to Prometheus metrics
  prometheus:
    endpoint: "0.0.0.0:8889"

extensions:
  # Health check extension
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]

  pipelines:
    # Traces pipeline
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, attributes, resource_detection]
      exporters: [logging]
    
    # Metrics pipeline
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch, attributes, resource_detection]
      exporters: [logging, prometheus]
    
    # Logs pipeline
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch, attributes, resource_detection]
      exporters: [logging]
